# ════════════════════════════════════════════════════════════════
#  Tmux Configuration — Omarchy Style (2026)
#  Clean • Minimal • Neovim-friendly • Powerkit Status Bar
# ════════════════════════════════════════════════════════════════


# ────────────────────────────────────────────────────────────────
# General Settings
# ────────────────────────────────────────────────────────────────

# Terminal + true color support (Ghostty + Neovim)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Better scrollback
set -g history-limit 50000

# Window / pane indexing starts at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Quality of life
set -g mouse on
setw -g mode-keys vi
setw -g clock-mode-style 12

# Status bar at the top
set -g status-position top

# Homebrew path support
set-environment -g PATH "/opt/homebrew/bin:/bin:/usr/bin"
set-environment -g PATH "$HOME/.local/share/mise/shims:$PATH"

# Better key handling
set -g extended-keys on
set -g extended-keys-format csi-u


# ────────────────────────────────────────────────────────────────
# Prefix Keys
# ────────────────────────────────────────────────────────────────

# Main prefix: Ctrl + Space (Omarchy default)
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Fallback prefix
set -g prefix2 C-b


# ────────────────────────────────────────────────────────────────
# Reload Config
# ────────────────────────────────────────────────────────────────

bind q source-file ~/.tmux.conf \; display-message "Config reloaded!"


# ────────────────────────────────────────────────────────────────
# Pane Management
# ────────────────────────────────────────────────────────────────

# Split panes using current path
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# Kill / zoom pane
bind x kill-pane
bind z resize-pane -Z


# ────────────────────────────────────────────────────────────────
# Smart Pane Navigation (Tmux + Neovim)
# ────────────────────────────────────────────────────────────────

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(g?(view|n?vim?x?)(diff)?|fzf)$'"

# Navigate seamlessly between tmux and nvim
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Same navigation inside copy mode
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R


# ────────────────────────────────────────────────────────────────
# Pane Resizing
# ────────────────────────────────────────────────────────────────

bind -n C-M-Left  resize-pane -L 5
bind -n C-M-Right resize-pane -R 5
bind -n C-M-Up    resize-pane -U 5
bind -n C-M-Down  resize-pane -D 5


# ────────────────────────────────────────────────────────────────
# Window Management
# ────────────────────────────────────────────────────────────────

# New / kill / rename
bind c new-window -c "#{pane_current_path}"
bind k kill-window
bind r command-prompt -I "#W" "rename-window '%%'"

# Quick switching (Alt + 1–9)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9


# ────────────────────────────────────────────────────────────────
# Session Management
# ────────────────────────────────────────────────────────────────

bind s choose-session
bind C new-session
bind K kill-session
bind R command-prompt -I "#S" "rename-session '%%'"
bind d detach-client


# ────────────────────────────────────────────────────────────────
# Copy Mode (Vi Style)
# ────────────────────────────────────────────────────────────────

bind [ copy-mode

bind -T copy-mode-vi v      send-keys -X begin-selection
bind -T copy-mode-vi y      send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel


# ════════════════════════════════════════════════════════════════
# Plugins
# ════════════════════════════════════════════════════════════════

# TPM
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin 'eduwass/tmux-palette'

# ────────────────────────────────────────────────────────────────
# Theme
# ────────────────────────────────────────────────────────────────

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue

# ════════════════════════════════════════════════════════════════
# TPM Initialization
# (MUST stay at the very bottom)
# ════════════════════════════════════════════════════════════════

run "~/.tmux/plugins/tpm/tpm"
